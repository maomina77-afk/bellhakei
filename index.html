<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>釣り鐘解析・自動カウントシステム</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 0; }
        * { box-sizing: border-box; }
        h2, h3 { color: #569cd6; margin: 10px 0 5px 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; background-color: #252526; padding: 10px; border-bottom: 1px solid #3e3e42; position: sticky; top: 0; z-index: 100; }
        .clock { font-size: 1.5em; color: #4fc1ff; font-family: monospace; font-weight: bold; }
        
        .toolbar { display: flex; gap: 5px; padding: 10px; background: #2d2d2d; flex-wrap: wrap; }
        button { flex: 1; min-width: 120px; background-color: #0e639c; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; touch-action: manipulation; }
        button:active { background-color: #1177bb; }
        button:disabled { background-color: #555; cursor: not-allowed; color: #888; }
        .btn-setting { background-color: #512da8; }
        
        .container { padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .panel { background-color: #2d2d2d; border: 1px solid #3e3e42; border-radius: 8px; padding: 12px; }
        
        canvas { background-color: #000; border: 1px solid #555; width: 100%; height: 100px; border-radius: 4px; display: block; margin-bottom: 5px; }
        
        .count-display { font-size: 4em; font-weight: bold; color: #4fc1ff; text-align: center; line-height: 1; margin: 10px 0; }
        .timer-msg { font-size: 1.2em; color: #dcdcaa; font-weight: bold; text-align: center; min-height: 1.5em; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { border: 1px solid #555; padding: 8px 5px; text-align: center; }
        th { background-color: #333; }
        .log-wrap { max-height: 150px; overflow-y: auto; }
        
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 12px; background-color: #555; font-size: 0.8em; font-weight: bold; margin-bottom: 5px; }
        .status-active { background-color: #28a745; color: white; }
        .status-recording { background-color: #dc3545; color: white; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        dialog { background-color: #1e1e1e; color: #d4d4d4; border: 2px solid #007acc; border-radius: 10px; width: 95%; max-width: 400px; padding: 15px; margin: auto; }
        dialog::backdrop { background: rgba(0, 0, 0, 0.7); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9em; }
        input[type="number"], input[type="time"] { background-color: #3c3c3c; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; width: 80px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 1.1em; font-weight: bold; color: #fff;">鐘解析システム</div>
    <div class="clock" id="clockDisplay">00:00:00</div>
</div>

<div class="toolbar">
    <button id="btnStartAudio">🎤 マイク接続・監視開始</button>
    <button id="btnOpenSettings" class="btn-setting">⚙️ 設定を開く</button>
</div>

<div class="container">
    <div class="panel">
        <div style="display: flex; justify-content: space-between;">
            <span id="audioStatus" class="status-badge">監視: 停止中</span>
            <span id="recordingStatus" class="status-badge" style="display:none;">🔴 動画保存中...</span>
        </div>
        
        <h3 style="font-size: 1em;">波形 (Time Domain)</h3>
        <canvas id="waveformCanvas"></canvas>
        
        <h3 style="font-size: 1em;">スペクトル (Frequency Domain)</h3>
        <canvas id="spectrumCanvas"></canvas>
    </div>

    <div class="panel" style="border-color: #4fc1ff;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h2 style="margin: 0;">検知カウント</h2>
            <button id="btnResetCount" style="min-width: auto; padding: 5px 10px; font-size: 0.8em; background: #555;">リセット</button>
        </div>
        <div class="count-display"><span id="bellCount">0</span></div>
        
        <hr style="border-color: #444; margin: 15px 0;">
        
        <h3 style="margin: 0 0 10px 0;">鐘つきタイマー</h3>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button id="btnStartTimer">▶ 開始</button>
            <button id="btnStopTimer" disabled style="background-color: #d13438;">■ 停止</button>
        </div>
        <div class="timer-msg" id="timerMessage">待機中</div>
    </div>

    <div class="panel">
        <h3 style="margin: 0 0 10px 0;">検知ログ</h3>
        <div class="log-wrap">
            <table id="logTable">
                <thead><tr><th>回数</th><th>検知時刻</th><th>最大強度</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<dialog id="settingsDialog">
    <h2 style="margin-top:0;">システム設定</h2>
    
    <div style="background: #2d2d2d; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
        <h3>学習機能（指紋作成）</h3>
        <div id="learningResult" style="font-size: 0.9em; margin-bottom: 10px; color: #ce9178;">未学習</div>
        <div style="display: flex; gap: 5px;">
            <button id="btnLearnStart" style="padding: 8px;">学習開始(3秒)</button>
            <button id="btnSaveProfile" style="padding: 8px;">保存</button>
            <input type="file" id="fileLoadProfile" accept=".json" style="display: none;">
            <button id="btnLoadProfile" style="padding: 8px;" onclick="document.getElementById('fileLoadProfile').click();">読込</button>
        </div>
    </div>

    <div style="background: #2d2d2d; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
        <h3>タイマー設定</h3>
        <div class="setting-row">
            <span>開始時刻 (空欄で10秒後)</span>
            <input type="time" id="timerStartTime">
        </div>
        <div class="setting-row">
            <span>打鐘間隔 (秒)</span>
            <input type="number" id="timerInterval" value="45" min="1">
        </div>
        <div class="setting-row">
            <span>事前通知 (秒前)</span>
            <input type="number" id="timerPreNotice" value="5" min="0">
        </div>
        <div class="setting-row">
            <span>通知回数上限</span>
            <input type="number" id="timerLimit" value="108" min="1">
        </div>
    </div>

    <button id="btnCloseSettings" style="width: 100%; background-color: #555;">閉じる</button>
</dialog>

<!-- 録画用の隠しキャンバス -->
<canvas id="recordCanvas" width="600" height="400" style="display: none;"></canvas>

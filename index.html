<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>釣り鐘解析・自動カウントシステム</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #d4d4d4; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        h1, h2, h3 { color: #569cd6; margin-top: 0; }
        
        /* ヘッダー・時計 */
        .header { display: flex; justify-content: space-between; align-items: center; background-color: #252526; padding: 10px 20px; border-bottom: 1px solid #3e3e42; margin-bottom: 10px; }
        .clock { font-size: 1.8em; color: #4fc1ff; font-family: monospace; font-weight: bold; }
        
        /* レイアウト */
        .main-content { display: flex; gap: 15px; flex: 1; overflow: hidden; }
        .left-col, .right-col { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .left-col { flex: 1.2; }
        
        .panel { background-color: #2d2d2d; border: 1px solid #3e3e42; border-radius: 8px; padding: 15px; overflow-y: auto; }
        
        /* 設定パネル (折りたたみ式) */
        #settingsPanel { display: none; background-color: #1e1e1e; border: 1px solid #007acc; border-radius: 8px; padding: 15px; position: absolute; top: 70px; left: 20px; right: 20px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-height: 80vh; overflow-y: auto; }
        .settings-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .settings-box { flex: 1; min-width: 300px; background-color: #2d2d2d; padding: 15px; border-radius: 5px; }
        
        /* UI要素 */
        button { background-color: #0e639c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 3px; font-weight: bold; }
        button:hover { background-color: #1177bb; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        input, select { background-color: #3c3c3c; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        
        /* キャンバス・ビデオ */
        canvas { background-color: #000; border: 1px solid #555; width: 100%; height: 120px; border-radius: 4px; }
        #previewVideo { width: 100%; max-height: 150px; background-color: #000; border-radius: 4px; border: 1px solid #555; object-fit: cover; }
        
        /* テーブル・テキスト */
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { border: 1px solid #555; padding: 5px; text-align: left; }
        th { background-color: #333; position: sticky; top: 0; }
        .log-container { flex: 1; overflow-y: auto; min-height: 100px; }
        
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 12px; background-color: #555; font-size: 0.8em; font-weight: bold; }
        .status-active { background-color: #28a745; color: white; }
        .status-recording { background-color: #dc3545; color: white; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.5em;">釣り鐘解析システム</h1>
    <div>
        <button id="btnStartAudio">🎥 マイク・カメラ接続開始</button>
        <button id="btnToggleSettings" style="background-color: #512da8;">⚙️ 設定を開く</button>
    </div>
    <div class="clock" id="clockDisplay">00:00:00</div>
</div>

<div id="settingsPanel">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 10px;">
        <h2>システム設定</h2>
        <button id="btnCloseSettings" style="background-color: #d13438;">閉じる</button>
    </div>
    <div class="settings-grid">
        <div class="settings-box">
            <h3>学習機能（プロファイル作成）</h3>
            <p style="font-size: 0.9em; color: #aaa;">ノイズのない状態で鐘を鳴らして記憶させます。</p>
            <button id="btnLearnStart">学習開始 (3秒)</button>
            <button id="btnSaveProfile">学習データ保存</button>
            <input type="file" id="fileLoadProfile" accept=".json" style="display: none;">
            <button id="btnLoadProfile" onclick="document.getElementById('fileLoadProfile').click();">読込</button>
            <div id="learningResult" style="font-size: 0.9em; margin-top: 10px; color: #ce9178;">未学習</div>
        </div>
        <div class="settings-box">
            <h3>鐘つき間隔お知らせタイマー</h3>
            <div style="display: grid; grid-template-columns: 100px 1fr; gap: 8px; align-items: center; font-size: 0.9em;">
                <label>開始時刻:</label> <input type="time" id="timerStartTime" title="未入力の場合は開始ボタンを押した10秒後に設定されます">
                <label>打鐘間隔:</label> <div><input type="number" id="timerInterval" value="45" min="1" style="width: 60px;"> 秒</div>
                <label>事前通知:</label> <div><input type="number" id="timerPreNotice" value="5" min="0" style="width: 60px;"> 秒前</div>
                <label>通知回数:</label> <div><input type="number" id="timerLimit" value="108" min="1" style="width: 60px;"> 回</div>
            </div>
            <p style="font-size: 0.8em; color: #aaa;">※開始時刻未入力で開始すると「10秒後」に自動設定されます。</p>
        </div>
    </div>
</div>

<div class="main-content">
    
    <div class="left-col">
        <div class="panel" style="flex: 0 0 auto; padding: 10px; text-align: center;">
            <video id="previewVideo" autoplay muted></video>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                <span id="audioStatus" class="status-badge">停止中</span>
                <span id="recordingStatus" class="status-badge" style="display: none;">動画保存待機中...</span>
            </div>
        </div>
        
        <div class="panel" style="flex: 1; display: flex; flex-direction: column;">
            <h3 style="margin:0 0 5px 0; font-size: 1.1em;">波形 (Time Domain)</h3>
            <canvas id="waveformCanvas"></canvas>
            <h3 style="margin:10px 0 5px 0; font-size: 1.1em;">スペクトル (Frequency Domain)</h3>
            <canvas id="spectrumCanvas" style="flex:1;"></canvas>
        </div>
    </div>

    <div class="right-col">
        <div class="panel" style="text-align: center; background-color: #1e1e1e; border-color: #4fc1ff; border-width: 2px;">
            <h2 style="margin:0 0 10px 0;">カウント数</h2>
            <div style="font-size: 4.5em; font-weight: bold; color: #4fc1ff; line-height: 1;">
                <span id="bellCount">0</span>
            </div>
            <button id="btnResetCount" style="margin-top: 10px; background-color: #555;">カウントリセット</button>
        </div>

        <div class="panel" style="flex: 0 0 auto;">
            <h3 style="margin: 0 0 10px 0;">タイマーステータス</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button id="btnStartTimer">タイマー開始</button>
                <button id="btnStopTimer" disabled>停止</button>
                <span id="timerStatus" class="status-badge" style="margin-top: 5px;">待機中</span>
            </div>
            <div id="timerMessage" style="font-size: 1.2em; color: #dcdcaa; font-weight: bold; height: 1.5em;"></div>
        </div>

        <div class="panel log-container">
            <h3 style="margin:0 0 10px 0;">検知ログ (最新が上)</h3>
            <table id="logTable">
                <thead><tr><th>#</th><th>検知時刻</th><th>最大強度</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    // === 時計更新 ===
    setInterval(() => {
        const now = new Date();
        document.getElementById('clockDisplay').textContent = 
            String(now.getHours()).padStart(2, '0') + ':' + 
            String(now.getMinutes()).padStart(2, '0') + ':' + 
            String(now.getSeconds()).padStart(2, '0');
    }, 1000);

    // === 設定パネル開閉 ===
    document.getElementById('btnToggleSettings').addEventListener('click', () => {
        document.getElementById('settingsPanel').style.display = 'block';
    });
    document.getElementById('btnCloseSettings').addEventListener('click', () => {
        document.getElementById('settingsPanel').style.display = 'none';
    });

    // === 状態変数と永続化 ===
    let state = { count: 0, logs: [], learnedPeaks: [], threshold: 150 };
    const savedState = localStorage.getItem('bellhakei_state_v2');
    if (savedState) { state = JSON.parse(savedState); updateLogUI(); }
    function saveState() { localStorage.setItem('bellhakei_state_v2', JSON.stringify(state)); }

    // === オーディオ・ビデオ解析関連 ===
    let audioContext, analyser, microphone, dataArray, freqArray;
    let isAnalyzing = false, isLearning = false, isRinging = false;
    let cooldownTimer = null, tempPeaks = [];
    
    // 録画関連
    let mediaRecorder;
    let recordedChunks = [];
    let isPostRecording = false;
    let postRecordFrames = 0; // 残り録画秒数

    const waveformCanvas = document.getElementById('waveformCanvas');
    const spectrumCanvas = document.getElementById('spectrumCanvas');
    const canvasCtxW = waveformCanvas.getContext('2d');
    const canvasCtxS = spectrumCanvas.getContext('2d');
    
    // 描画オーバーレイ用フラグ
    let highlightFrames = 0;

    document.getElementById('btnStartAudio').addEventListener('click', async () => {
        if (isAnalyzing) return;
        try {
            // 音声と映像(ビデオ)の両方を要求
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            
            // ビデオプレビューのセット
            const videoElement = document.getElementById('previewVideo');
            videoElement.srcObject = stream;

            // オーディオ解析のセット
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;
            microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);
            
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            freqArray = new Uint8Array(analyser.frequencyBinCount);
            
            // バックグラウンド録画の設定 (1秒ごとにチャンクを生成)
            startContinuousRecording(stream);

            isAnalyzing = true;
            document.getElementById('audioStatus').textContent = '解析・監視中';
            document.getElementById('audioStatus').classList.add('status-active');
            draw();
            detectLoop();
            
            // 接続ボタンを無効化
            document.getElementById('btnStartAudio').disabled = true;
            document.getElementById('btnStartAudio').textContent = '接続済み';

        } catch (err) {
            alert('カメラ・マイクのアクセスが拒否されたか、エラーが発生しました: \n' + err.message);
        }
    });

    // 常時録画機能 (リングバッファ)
    function startContinuousRecording(stream) {
        // webmを優先
        let mime = 'video/webm';
        if(!MediaRecorder.isTypeSupported(mime)) mime = 'video/mp4'; 

        mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) {
                recordedChunks.push(e.data);
                
                if (!isPostRecording) {
                    // 検知待ち状態：直近10秒分（10チャンク）だけを保持し、古いものを捨てる
                    if (recordedChunks.length > 10) recordedChunks.shift();
                } else {
                    // 検知後：カウントダウンして録画継続
                    postRecordFrames--;
                    const statEl = document.getElementById('recordingStatus');
                    statEl.textContent = `🔴 検知動画保存中... 残り ${postRecordFrames} 秒`;
                    
                    if (postRecordFrames <= 0) {
                        // 10秒経過したらファイル保存してバッファリセット
                        saveVideoBlob();
                        isPostRecording = false;
                        recordedChunks = []; // バッファクリア（次回の検知に向けリセット）
                        statEl.style.display = 'none';
                        statEl.classList.remove('status-recording');
                    }
                }
            }
        };
        // 1000ms(1秒)ごとに区切ってデータを吐き出す
        mediaRecorder.start(1000); 
    }

    // 動画をファイルとしてダウンロード
    function saveVideoBlob() {
        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        // 例: bell_capture_20231025_123456.webm
        const ds = new Date().toISOString().replace(/T/, '_').replace(/:/g, '').split('.')[0];
        a.download = `bell_capture_${ds}.webm`;
        a.click();
    }

    // 描画ループ (オーバーレイ対応)
    function draw() {
        if (!isAnalyzing) return;
        requestAnimationFrame(draw);
        
        const wW = waveformCanvas.width;
        const wH = waveformCanvas.height;
        const sW = spectrumCanvas.width;
        const sH = spectrumCanvas.height;

        // --- 波形描画 ---
        analyser.getByteTimeDomainData(dataArray);
        canvasCtxW.fillStyle = '#000';
        canvasCtxW.fillRect(0, 0, wW, wH);
        canvasCtxW.lineWidth = 2;
        canvasCtxW.strokeStyle = '#4fc1ff';
        canvasCtxW.beginPath();
        const sliceWidth = wW * 1.0 / analyser.frequencyBinCount;
        let x = 0;
        for(let i = 0; i < analyser.frequencyBinCount; i++) {
            const y = (dataArray[i] / 128.0) * wH / 2;
            if(i === 0) canvasCtxW.moveTo(x, y); else canvasCtxW.lineTo(x, y);
            x += sliceWidth;
        }
        canvasCtxW.lineTo(wW, wH / 2);
        canvasCtxW.stroke();

        // オーバーレイ (波形キャンバスを赤く点滅)
        if (highlightFrames > 0) {
            canvasCtxW.fillStyle = 'rgba(255, 50, 50, 0.3)';
            canvasCtxW.fillRect(0, 0, wW, wH);
        }

        // --- スペクトル描画 ---
        analyser.getByteFrequencyData(freqArray);
        canvasCtxS.fillStyle = '#000';
        canvasCtxS.fillRect(0, 0, sW, sH);
        const barWidth = (sW / analyser.frequencyBinCount) * 2.5;
        
        x = 0;
        for(let i = 0; i < analyser.frequencyBinCount; i++) {
            const barHeight = freqArray[i] * (sH / 255); // 高さをキャンバスに合わせる
            canvasCtxS.fillStyle = `rgb(${freqArray[i] + 100}, 50, 50)`;
            canvasCtxS.fillRect(x, sH - barHeight, barWidth, barHeight);
            x += barWidth + 1;
        }

        // オーバーレイ (検知したピーク周波数位置に黄色い縦線)
        if (highlightFrames > 0 && state.learnedPeaks.length > 0) {
            canvasCtxS.fillStyle = 'rgba(255, 255, 0, 0.7)';
            state.learnedPeaks.forEach(idx => {
                const px = idx * (barWidth + 1);
                canvasCtxS.fillRect(px, 0, Math.max(barWidth, 2), sH);
            });
            highlightFrames--;
        }
    }

    // === 学習処理 ===
    document.getElementById('btnLearnStart').addEventListener('click', () => {
        if (!isAnalyzing) return alert('先にマイク接続を開始してください。');
        if (isLearning) return; 
        const btn = document.getElementById('btnLearnStart');
        const resultDiv = document.getElementById('learningResult');
        
        btn.disabled = true;
        let countdown = 5;
        resultDiv.style.color = '#dcdcaa';
        resultDiv.textContent = `⏳ ${countdown}秒後に学習を開始します。`;
        
        const countInterval = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                resultDiv.textContent = `⏳ ${countdown}秒後に学習を開始します。`;
            } else {
                clearInterval(countInterval);
                startRecording(); 
            }
        }, 1000);

        function startRecording() {
            isLearning = true;
            tempPeaks = new Array(analyser.frequencyBinCount).fill(0);
            resultDiv.style.color = '#ff6b6b';
            resultDiv.textContent = "🔴 鐘を鳴らしてください... 学習中 (3秒間)";
            
            let frames = 0;
            const learnInterval = setInterval(() => {
                analyser.getByteFrequencyData(freqArray);
                for(let i = 0; i < freqArray.length; i++) tempPeaks[i] += freqArray[i];
                frames++;
            }, 50);

            setTimeout(() => {
                clearInterval(learnInterval);
                isLearning = false;
                btn.disabled = false;
                let avgPeaks = tempPeaks.map(v => v / frames);
                let peaksWithIndex = avgPeaks.map((val, idx) => ({val, idx})).sort((a, b) => b.val - a.val);
                state.learnedPeaks = peaksWithIndex.slice(0, 5).map(p => p.idx);
                
                resultDiv.style.color = '#ce9178';
                resultDiv.textContent = `✅ 完了: 特徴インデックス [${state.learnedPeaks.join(', ')}]`;
                saveState();
            }, 3000);
        }
    });

    // 検出処理
    function detectLoop() {
        if (!isAnalyzing) return;
        requestAnimationFrame(detectLoop);
        if (isLearning || state.learnedPeaks.length === 0 || isRinging) return;

        analyser.getByteFrequencyData(freqArray);
        
        let matchScore = 0, maxVal = 0;
        for (let idx of state.learnedPeaks) {
            if (freqArray[idx] > state.threshold) {
                matchScore++;
                if(freqArray[idx] > maxVal) maxVal = freqArray[idx];
            }
        }
        if (matchScore >= Math.ceil(state.learnedPeaks.length / 2)) {
            triggerBellCount(maxVal);
        }
    }

    // 検知トリガー
    function triggerBellCount(maxVal) {
        isRinging = true;
        state.count++;
        const now = new Date();
        const timeStr = now.toLocaleTimeString() + '.' + String(now.getMilliseconds()).padStart(3, '0');
        state.logs.push({ count: state.count, time: timeStr, maxVol: maxVal });
        
        // 描画オーバーレイを約1秒間(60フレーム)表示
        highlightFrames = 60; 

        // 録画トリガー (事後10秒のカウントダウン開始)
        if (!isPostRecording && mediaRecorder && mediaRecorder.state === 'recording') {
            isPostRecording = true;
            postRecordFrames = 10;
            const statEl = document.getElementById('recordingStatus');
            statEl.style.display = 'inline-block';
            statEl.classList.add('status-recording');
            statEl.textContent = `🔴 検知動画保存中... 残り 10 秒`;
        }
        
        updateLogUI();
        saveState();

        // 二重カウント防止のクールダウン
        clearTimeout(cooldownTimer);
        cooldownTimer = setTimeout(() => { isRinging = false; }, 28000);
    }

    // === UI更新・ファイル保存関連 ===
    function updateLogUI() {
        document.getElementById('bellCount').textContent = state.count;
        const tbody = document.querySelector('#logTable tbody');
        tbody.innerHTML = '';
        state.logs.slice().reverse().forEach(log => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${log.count}</td><td>${log.time}</td><td>${log.maxVol}</td>`;
            tbody.appendChild(tr);
        });
        if(state.learnedPeaks.length > 0) {
            document.getElementById('learningResult').textContent = `✅ プロファイルロード済み`;
        }
    }

    document.getElementById('btnResetCount').addEventListener('click', () => {
        if(confirm('カウントとログをリセットしますか？')) {
            state.count = 0; state.logs = []; updateLogUI(); saveState();
        }
    });

    document.getElementById('btnSaveProfile').addEventListener('click', () => {
        if(state.learnedPeaks.length === 0) return alert('学習データがありません');
        const blob = new Blob([JSON.stringify({ learnedPeaks: state.learnedPeaks })], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'bell_profile.json';
        a.click();
    });

    document.getElementById('fileLoadProfile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.learnedPeaks) {
                    state.learnedPeaks = data.learnedPeaks; saveState(); updateLogUI();
                    alert('学習データを読み込みました。');
                    document.getElementById('btnCloseSettings').click(); // 読込成功したら閉じる
                }
            } catch (err) { alert('ファイルの読み込みに失敗しました。'); }
        };
        reader.readAsText(file);
    });

    // === タイマーお知らせ機能 (太い音に改良) ===
    let timerLoop;
    let currentTimerCount = 0;
    
    // 改良版ビープ音：2つのオシレーターをズラして(デチューン)鳴らし、音圧を上げる
    function playStrongBeep(freq, duration, type='square') {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const osc1 = audioContext.createOscillator();
        const osc2 = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioContext.destination);
        
        osc1.type = type;
        osc2.type = type;
        
        osc1.frequency.setValueAtTime(freq, audioContext.currentTime);
        // osc2は少しだけ周波数をズラして「うねり」を作り、音を太く目立たせる
        osc2.frequency.setValueAtTime(freq * 1.015, audioContext.currentTime); 
        
        // 音量設定
        gain.gain.setValueAtTime(0.8, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
        
        osc1.start(audioContext.currentTime);
        osc2.start(audioContext.currentTime);
        osc1.stop(audioContext.currentTime + duration);
        osc2.stop(audioContext.currentTime + duration);
    }

    document.getElementById('btnStartTimer').addEventListener('click', () => {
        const startTimeInput = document.getElementById('timerStartTime').value;
        const intervalSec = parseInt(document.getElementById('timerInterval').value);
        const preNoticeSec = parseInt(document.getElementById('timerPreNotice').value);
        const limit = parseInt(document.getElementById('timerLimit').value);
        const msgEl = document.getElementById('timerMessage');
        
        let targetStart;
        const now = new Date();
        
        // 時刻が未記入の場合は「現在時刻の10秒後」を設定
        if (!startTimeInput) {
            targetStart = new Date(now.getTime() + 10000); 
            // Inputフィールドにも反映させておく
            document.getElementById('timerStartTime').value = 
                String(targetStart.getHours()).padStart(2, '0') + ':' + 
                String(targetStart.getMinutes()).padStart(2, '0');
            msgEl.textContent = "未入力のため、10秒後に開始します";
        } else {
            const [hours, minutes] = startTimeInput.split(':');
            targetStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);
            // 過去の時刻が指定されたら明日にする
            if (targetStart < now) targetStart.setDate(targetStart.getDate() + 1);
        }
        
        document.getElementById('btnStartTimer').disabled = true;
        document.getElementById('btnStopTimer').disabled = false;
        document.getElementById('timerStatus').textContent = '動作中';
        document.getElementById('timerStatus').classList.add('status-active');
        document.getElementById('btnCloseSettings').click(); // 設定パネルを閉じる
        
        currentTimerCount = 0;
        let isPreNotified = false;

        timerLoop = setInterval(() => {
            const currentNow = new Date();
            const targetTime = new Date(targetStart.getTime() + (currentTimerCount * intervalSec * 1000));
            const diffSec = (targetTime.getTime() - currentNow.getTime()) / 1000;

            msgEl.textContent = `次の打鐘まで: ${Math.max(0, diffSec).toFixed(1)} 秒 (回数: ${currentTimerCount + 1}/${limit})`;

            // 事前通知 (高くて短い矩形波)
            if (diffSec <= preNoticeSec && diffSec > 0 && !isPreNotified) {
                playStrongBeep(880, 0.2, 'square'); 
                isPreNotified = true;
            }

            // 打鐘時刻到達 (低くて長い三角波)
            if (diffSec <= 0) {
                playStrongBeep(440, 1.0, 'triangle'); 
                currentTimerCount++;
                isPreNotified = false; 

                if (currentTimerCount >= limit) {
                    document.getElementById('btnStopTimer').click();
                    msgEl.textContent = 'タイマー完了';
                }
            }
        }, 100); 
    });

    document.getElementById('btnStopTimer').addEventListener('click', () => {
        clearInterval(timerLoop);
        document.getElementById('btnStartTimer').disabled = false;
        document.getElementById('btnStopTimer').disabled = true;
        document.getElementById('timerStatus').textContent = '待機中';
        document.getElementById('timerStatus').classList.remove('status-active');
        document.getElementById('timerMessage').textContent = '';
    });
</script>

</body>
</html>
